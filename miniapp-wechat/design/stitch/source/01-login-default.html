<!DOCTYPE html>

<html class="h-full" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>01 登录｜默认</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=Source+Sans+3:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0F766E",
                        "primary-dark": "#115E59",
                        "on-primary": "#FFFFFF",
                        "surface": "#FFFFFF",
                        "background": "#F8FAFC",
                        "text-primary": "#172033",
                        "text-secondary": "#64748B",
                        "border-light": "#E2E8F0",
                        "success": "#15803D",
                        "warning": "#F97316",
                        "error": "#B42318"
                    },
                    fontFamily: {
                        "headline": ["'Noto Sans SC'", "'Source Sans 3'", "sans-serif"],
                        "body": ["'Noto Sans SC'", "'Source Sans 3'", "sans-serif"]
                    },
                    borderRadius: {
                        "card": "16px",
                        "button": "8px"
                    },
                    boxShadow: {
                        "soft": "0 4px 12px -2px rgba(0, 0, 0, 0.05)"
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #F8FAFC;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* WeChat Safe Area Simulation */
        .safe-area-top {
            padding-top: env(safe-area-inset-top, 44px);
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom, 34px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-full flex flex-col text-text-primary overflow-hidden">
<!-- Top Navigation Bar (Shared Component Context) -->
<header class="w-full top-0 sticky bg-surface flex items-center justify-center h-14 px-4 z-50 safe-area-top">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="factory">factory</span>
<h1 class="text-xl font-bold text-primary tracking-tight">羽智造 MES</h1>
</div>
</header>
<main class="flex-1 flex flex-col px-6 pt-12 pb-8 overflow-y-auto">
<!-- Brand Header Section -->
<section class="flex flex-col items-center text-center mb-10">
<div class="w-20 h-20 bg-primary/5 rounded-2xl flex items-center justify-center mb-6 border border-primary/10">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="sports_badminton">badminton</span>
</div>
<h2 class="text-2xl font-bold text-text-primary mb-2">羽毛球制造 MES</h2>
<p class="text-text-secondary">生产数据，随时掌握</p>
</section>
<!-- Core Capabilities Card -->
<section class="bg-surface border border-border-light rounded-card shadow-soft p-6 mb-auto">
<div class="space-y-8">
<!-- Item 1 -->
<div class="flex items-start gap-4">
<div class="mt-1 w-10 h-10 rounded-lg bg-slate-50 flex items-center justify-center border border-slate-100 shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="dashboard">dashboard</span>
</div>
<div>
<h3 class="font-bold text-text-primary">实时看板</h3>
<p class="text-sm text-text-secondary mt-0.5">车间状态一目了然，多维度动态监控</p>
</div>
</div>
<!-- Item 2 -->
<div class="flex items-start gap-4">
<div class="mt-1 w-10 h-10 rounded-lg bg-slate-50 flex items-center justify-center border border-slate-100 shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="analytics">analytics</span>
</div>
<div>
<h3 class="font-bold text-text-primary">生产分析</h3>
<p class="text-sm text-text-secondary mt-0.5">效率瓶颈精准定位，数据驱动优化决策</p>
</div>
</div>
<!-- Item 3 -->
<div class="flex items-start gap-4">
<div class="mt-1 w-10 h-10 rounded-lg bg-slate-50 flex items-center justify-center border border-slate-100 shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
<div>
<h3 class="font-bold text-text-primary">批次追溯</h3>
<p class="text-sm text-text-secondary mt-0.5">全程质量透明可溯，原料至成品全链条闭环</p>
</div>
</div>
</div>
</section>
<!-- Footer Action Section -->
<section class="mt-10 safe-area-bottom">
<button class="w-full h-12 bg-primary active:bg-primary-dark text-on-primary rounded-button flex items-center justify-center gap-2 transition-all duration-200 shadow-sm">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.3 12.1c.1 0 .2.1.2.2 0 .1-.1.2-.2.2h-.9c-.1 0-.2-.1-.2-.2 0-.1.1-.2.2-.2h.9zm2.4 0c.1 0 .2.1.2.2 0 .1-.1.2-.2.2h-.9c-.1 0-.2-.1-.2-.2 0-.1.1-.2.2-.2h.9zm2.4 1.5c1.4 0 2.6-.9 2.6-2s-1.2-2-2.6-2c-1.4 0-2.6.9-2.6 2s1.2 2 2.6 2zm4.3 1c1.8 0 3.2-1.2 3.2-2.7s-1.4-2.7-3.2-2.7c-1.8 0-3.2 1.2-3.2 2.7s1.4 2.7 3.2 2.7zm-6.5 1.5c-1.9 0-3.5 1.4-3.5 3 0 .7.3 1.3.8 1.8l-.1.4c0 .1 0 .1.1.2h.1l.4-.2c.2.1.5.1.8.1 1.9 0 3.5-1.4 3.5-3 0-1.6-1.6-3-3.5-3zm-1.8 1.8c.2 0 .3.1.3.3 0 .1-.1.3-.3.3h-1.2c-.2 0-.3-.1-.3-.3 0-.1.1-.3.3-.3h1.2zm3.1 0c.2 0 .3.1.3.3 0 .1-.1.3-.3.3h-1.2c-.2 0-.3-.1-.3-.3 0-.1.1-.3.3-.3h1.2zM21 7.2c2.2 0 4 1.6 4 3.5s-1.8 3.5-4 3.5c-.2 0-.4 0-.6-.1-.5.3-.9.6-1.4.9-.1 0-.2 0-.2-.1l.1-.9c-1.2-.7-1.9-1.9-1.9-3.3 0-1.9 1.8-3.5 4-3.5z" transform="translate(-1 -1)"></path>
</svg>
<span class="font-medium">微信快捷登录</span>
</button>
<p class="text-center text-xs text-text-secondary mt-4 leading-relaxed">
                登录即表示同意 
                <a class="text-text-primary font-medium underline decoration-border-light underline-offset-2" href="#">用户协议</a> 
                和 
                <a class="text-text-primary font-medium underline decoration-border-light underline-offset-2" href="#">隐私政策</a>
</p>
</section>
</main>
<!-- Decoration element (Industrial subtle line pattern) -->
<div class="fixed bottom-0 left-0 w-full h-1 pointer-events-none opacity-20">
<div class="w-full h-full" style="background-image: repeating-linear-gradient(45deg, #0F766E, #0F766E 2px, transparent 2px, transparent 10px);"></div>
</div>
<script>
        // Simple micro-interaction for button
        document.querySelector('button').addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.98)';
        });
        document.querySelector('button').addEventListener('touchend', function() {
            this.style.transform = 'scale(1)';
        });
    </script>
</body></html>
