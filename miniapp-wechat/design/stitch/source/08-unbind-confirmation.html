<body class="flex flex-col h-screen w-[375px] mx-auto overflow-hidden relative">

<!-- User Profile Placeholder Content -->
<main class="pt-20 px-4 pb-20">

<div class="space-y-3">

<!-- Bottom Nav Bar (Blurred Placeholder) -->

<!-- Modal Overlay -->
<div class="absolute inset-0 z-50 bg-blur-overlay flex items-center justify-center px-8">
<div class="flex flex-col items-center w-full">
<!-- Main Dialog -->
<div class="bg-white w-full rounded-2xl p-6 modal-shadow animate-in fade-in zoom-in duration-300">
<div class="flex flex-col items-center text-center">
<!-- Warning Icon -->
<div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-industry-red text-3xl">warning</span>
</div>
<h3 class="text-xl font-bold text-on-surface mb-3">解除账号绑定？</h3>
<p class="text-[15px] leading-relaxed text-industry-text-secondary mb-8">
                        解绑后当前登录会失效，下次微信登录需要重新绑定 MES 账号；生产数据不会被删除。
                    </p>
<!-- Buttons -->
<div class="flex flex-col w-full gap-3">
<button class="w-full h-12 rounded-xl bg-industry-red text-white font-bold text-base active:opacity-90 transition-opacity">
                            确认解绑
                        </button>
<button class="w-full h-12 rounded-xl bg-surface-container-low text-on-surface font-medium text-base active:bg-surface-container-high transition-colors">
                            取消
                        </button>
</div>
</div>
</div>
<!-- Developer/Spec Loading State Note -->
<div class="mt-8 self-start w-full">
<div class="flex items-center gap-2 px-3 py-2 bg-slate-800/80 rounded-lg border border-slate-700">
<div class="w-4 h-4 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
<span class="text-xs text-white font-medium">正在解除绑定…</span>
<div class="ml-auto">
<span class="text-[10px] px-1.5 py-0.5 bg-primary/20 text-primary-fixed rounded border border-primary/30 uppercase">Loading State Spec</span>
</div>
</div>
<p class="text-[10px] text-white/60 mt-1.5 px-1 italic">交互说明：点击“确认解绑”后按钮进入加载态并展示上述提示</p>
</div>
</div>
</div>
<!-- Interactive Script for micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const confirmBtn = document.querySelector('button.bg-industry-red');
            const cancelBtn = document.querySelector('button.bg-surface-container-low');
            const loadingSpec = document.querySelector('.bg-slate-800\\/80');

            confirmBtn.addEventListener('click', () => {
                confirmBtn.innerHTML = `
                    <div class="flex items-center justify-center gap-2">
                        <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                        <span>处理中</span>
                    </div>
                `;
                confirmBtn.disabled = true;
                loadingSpec.classList.add('ring-2', 'ring-primary', 'ring-offset-2', 'ring-offset-transparent');
                
                // Reset after 2s for demo purposes
                setTimeout(() => {
                    confirmBtn.innerHTML = '确认解绑';
                    confirmBtn.disabled = false;
                    loadingSpec.classList.remove('ring-2', 'ring-primary', 'ring-offset-2', 'ring-offset-transparent');
                }, 2000);
            });

            cancelBtn.addEventListener('click', () => {
                document.querySelector('.bg-blur-overlay').style.display = 'none';
            });
        });
    </script>
