<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>02 MES账号绑定｜默认（归档版）</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=Source+Sans+3:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#e5eeff",
                        "primary-fixed-dim": "#80d5cb",
                        "on-background": "#0b1c30",
                        "tertiary": "#893a00",
                        "on-secondary-fixed-variant": "#00504b",
                        "secondary-container": "#a8ece5",
                        "secondary-fixed-dim": "#8fd3cc",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#abefe8",
                        "on-tertiary-fixed": "#341100",
                        "background": "#f8f9ff",
                        "tertiary-fixed": "#ffdbca",
                        "on-primary-fixed": "#00201d",
                        "on-primary-container": "#a3faef",
                        "on-primary": "#ffffff",
                        "primary": "#005c55",
                        "tertiary-container": "#af4c00",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#006a63",
                        "inverse-on-surface": "#eaf1ff",
                        "on-primary-fixed-variant": "#00504a",
                        "on-tertiary-container": "#ffe6da",
                        "on-surface-variant": "#3e4947",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#213145",
                        "surface-container-high": "#dce9ff",
                        "outline-variant": "#bdc9c6",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "primary-container": "#0f766e",
                        "on-secondary-container": "#266d68",
                        "surface-container-low": "#eff4ff",
                        "surface-variant": "#d3e4fe",
                        "on-secondary-fixed": "#00201e",
                        "outline": "#6e7977",
                        "primary-fixed": "#9cf2e8",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb690",
                        "on-surface": "#0b1c30",
                        "error": "#ba1a1a",
                        "inverse-primary": "#80d5cb",
                        "secondary": "#216963",
                        "on-tertiary-fixed-variant": "#783200",
                        "surface-dim": "#cbdbf5",
                        "surface-container-highest": "#d3e4fe",
                        "surface": "#f8f9ff",
                        "on-tertiary": "#ffffff",
                        "industrial-teal": "#0F766E",
                        "safety-orange": "#F97316",
                        "text-secondary": "#64748B",
                        "border-light": "#E2E8F0"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "form": "16px",
                        "btn": "12px",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["'Noto Sans SC'", "'Source Sans 3'", "sans-serif"],
                        "display": ["'Noto Sans SC'", "'Source Sans 3'", "sans-serif"],
                        "body": ["'Noto Sans SC'", "'Source Sans 3'", "sans-serif"],
                        "label": ["'Noto Sans SC'", "'Source Sans 3'", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans SC', 'Source Sans 3', sans-serif;
            background-color: #F8FAFC;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .input-focus-ring:focus-within {
            border-color: #0F766E;
            box-shadow: 0 0 0 1px #0F766E;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Top AppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface flex justify-between items-center px-4 h-14 border-b border-border-light">
<button class="w-10 h-10 flex items-center justify-start text-on-surface active:opacity-60 transition-opacity">
<span class="material-symbols-outlined" data-icon="arrow_back_ios">arrow_back_ios</span>
</button>
<h1 class="font-headline text-lg font-bold text-on-surface absolute left-1/2 -translate-x-1/2">绑定 MES 账号</h1>
<div class="w-10"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-14 px-4 pt-10 pb-20 flex flex-col items-center">
<!-- Welcome Header -->
<section class="w-full mb-8">
<h2 class="text-2xl font-bold text-on-surface mb-2">欢迎登录</h2>
<p class="text-text-secondary text-sm">首次登录需要绑定已有 MES 账号</p>
</section>
<!-- Form Card -->
<div class="w-full bg-white rounded-form p-6 shadow-sm border border-border-light">
<!-- Employee ID Field -->
<div class="mb-6">
<label class="block text-sm font-medium mb-2 text-on-surface">
                    工号 <span class="text-error font-bold">*</span>
</label>
<div class="relative flex items-center border border-border-light rounded-lg bg-background input-focus-ring transition-all">
<div class="pl-3 pr-2 text-text-secondary">
<span class="material-symbols-outlined" data-icon="badge">badge</span>
</div>
<input class="w-full py-3 bg-transparent border-none focus:ring-0 text-on-surface text-[15px]" placeholder="MES10086" type="text" value="MES10086"/>
</div>
</div>
<!-- Password Field -->
<div class="mb-2">
<label class="block text-sm font-medium mb-2 text-on-surface">
                    密码 <span class="text-error font-bold">*</span>
</label>
<div class="relative flex items-center border border-safety-orange rounded-lg bg-background transition-all">
<div class="pl-3 pr-2 text-text-secondary">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="w-full py-3 bg-transparent border-none focus:ring-0 text-on-surface text-[15px]" placeholder="请输入您的密码" type="password"/>
<button class="pr-3 text-text-secondary active:text-primary">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Error Message -->
<div class="flex items-center gap-1 text-safety-orange text-xs font-medium mb-4">
<span class="material-symbols-outlined text-[14px]" data-icon="error_outline">error_outline</span>
<span>密码错误，请重新输入</span>
</div>
<!-- Action Button -->
<button class="w-full h-12 bg-industrial-teal text-white font-bold rounded-btn active:opacity-90 transition-all flex items-center justify-center mt-6">
                确认绑定
            </button>
</div>
<!-- Secondary Action -->
<button class="mt-8 text-text-secondary text-sm font-medium active:text-primary transition-colors">
            重新进行微信登录
        </button>
</main>
<!-- Footer Security Notice -->
<footer class="fixed bottom-0 left-0 w-full pb-8 flex justify-center items-center pointer-events-none">
<div class="flex items-center gap-1.5 text-text-secondary opacity-60">
<span class="material-symbols-outlined text-[16px]" data-icon="shield">shield</span>
<span class="text-xs">账号仅用于身份校验，不会保存密码</span>
</div>
</footer>
<!-- Background Decoration (Optional for Industrial Feel) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-20">
<div class="absolute top-1/4 -right-20 w-64 h-64 border-[32px] border-industrial-teal/5 rounded-full"></div>
<div class="absolute bottom-1/4 -left-20 w-40 h-40 border-[20px] border-industrial-teal/5 rotate-45"></div>
</div>
<script>
        // Password visibility toggle logic
        document.querySelectorAll('button').forEach(btn => {
            if(btn.querySelector('[data-icon="visibility_off"]')) {
                btn.addEventListener('click', function() {
                    const input = this.parentElement.querySelector('input');
                    const icon = this.querySelector('.material-symbols-outlined');
                    if(input.type === 'password') {
                        input.type = 'text';
                        icon.textContent = 'visibility';
                        icon.setAttribute('data-icon', 'visibility');
                    } else {
                        input.type = 'password';
                        icon.textContent = 'visibility_off';
                        icon.setAttribute('data-icon', 'visibility_off');
                    }
                });
            }
        });

        // Soft interaction feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.transform = 'scale(0.98)';
            });
            button.addEventListener('touchend', () => {
                button.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
