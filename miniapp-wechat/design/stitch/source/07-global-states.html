<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>07 全局状态｜加载·空·错误·会话失效</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=Source+Sans+3:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#006a63",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#893a00",

                        "on-surface-variant": "#3e4947",
                        "on-secondary-container": "#266d68",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#8fd3cc",
                        "outline-variant": "#bdc9c6",
                        "surface-container-high": "#dce9ff",
                        "on-background": "#0b1c30",
                        "surface": "#f8f9ff",
                        "inverse-surface": "#213145",
                        "on-tertiary-fixed": "#341100",
                        "inverse-primary": "#80d5cb",
                        "primary-fixed-dim": "#80d5cb",
                        "inverse-on-surface": "#eaf1ff",
                        "background": "#f8f9ff",
                        "tertiary-fixed-dim": "#ffb690",
                        "on-tertiary-container": "#ffe6da",
                        "primary": "#005c55",
                        "surface-dim": "#cbdbf5",

                        "error-container": "#ffdad6",

                        "on-secondary-fixed-variant": "#00504b",
                        "on-primary-fixed": "#00201d",
                        "secondary-fixed": "#abefe8",
                        "primary-container": "#0f766e",
                        "on-primary-fixed-variant": "#00504a",
                        "on-error-container": "#93000a",
                        "secondary-container": "#a8ece5",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#d3e4fe",
                        "on-tertiary-fixed-variant": "#783200",
                        "on-primary-container": "#a3faef",
                        "surface-container-low": "#eff4ff",
                        "outline": "#6e7977",
                        "surface-container": "#e5eeff",
                        "on-secondary": "#ffffff",
                        "secondary": "#216963",
                        "error": "#ba1a1a",
                        "industrial-teal": "#0F766E",
                        "industrial-teal-dark": "#115E59",
                        "safety-orange": "#F97316",
                        "bg-main": "#F8FAFC",
                        "text-main": "#172033",
                        "text-secondary": "#64748B",
                        "border-main": "#E2E8F0",
                        "danger-red": "#B42318",
                        "success-green": "#15803D"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["'Noto Sans SC'", "'Source Sans 3'"],
                        "display": ["'Noto Sans SC'", "'Source Sans 3'"],
                        "body": ["'Noto Sans SC'", "'Source Sans 3'"],
                        "label": ["'Noto Sans SC'", "'Source Sans 3'"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #F8FAFC; }
        .skeleton { background: linear-gradient(90deg, #E2E8F0 25%, #EDF2F7 50%, #E2E8F0 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex justify-center min-h-screen text-main">
<div class="w-full max-w-[375px] bg-bg-main relative shadow-xl overflow-hidden flex flex-col">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-background dark:bg-on-background border-b border-outline-variant dark:border-outline flex items-center justify-between px-4 h-12 z-40">
<button class="active:bg-surface-container-high transition-colors touch-manipulation flex items-center justify-center w-10 h-10">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">settings</span>
</button>
<h1 class="font-headline text-on-surface dark:text-inverse-on-surface font-bold text-lg">我的</h1>
<button class="active:bg-surface-container-high transition-colors touch-manipulation flex items-center justify-center w-10 h-10">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">notifications</span>
</button>
</header>
<main class="flex-1 pb-20 overflow-y-auto">
<!-- 1. Loading State -->
<section class="p-4 border-b border-border-main">
<h2 class="text-sm font-bold text-text-secondary mb-4 tracking-tight">加载：看板与任务骨架屏</h2>
<!-- Skeleton Dashboard Grid -->
<div class="grid grid-cols-2 gap-3 mb-6">
<div class="bg-white p-3 rounded-xl border border-border-main h-24">
<div class="skeleton h-3 w-16 rounded mb-3"></div>
<div class="skeleton h-6 w-24 rounded mb-2"></div>
<div class="skeleton h-3 w-10 rounded"></div>
</div>
<div class="bg-white p-3 rounded-xl border border-border-main h-24">
<div class="skeleton h-3 w-16 rounded mb-3"></div>
<div class="skeleton h-6 w-20 rounded mb-2"></div>
<div class="skeleton h-3 w-12 rounded"></div>
</div>
</div>
<!-- Skeleton Task List -->
<div class="space-y-3 mb-8">
<div class="bg-white p-4 rounded-xl border border-border-main flex items-start gap-3">
<div class="skeleton w-10 h-10 rounded-lg flex-shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="skeleton h-4 w-3/4 rounded"></div>
<div class="skeleton h-3 w-1/2 rounded"></div>
</div>
</div>
<div class="bg-white p-4 rounded-xl border border-border-main flex items-start gap-3">
<div class="skeleton w-10 h-10 rounded-lg flex-shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="skeleton h-4 w-2/3 rounded"></div>
<div class="skeleton h-3 w-1/3 rounded"></div>
</div>
</div>
</div>
<!-- Loading Spinner -->
<div class="flex flex-col items-center justify-center py-4">
<span class="material-symbols-outlined text-text-secondary loading-spinner mb-2" style="font-size: 24px;">progress_activity</span>
<p class="text-xs text-text-secondary">数据加载中...</p>
</div>
</section>
<!-- 2. Empty State -->
<section class="p-4 border-b border-border-main min-h-[320px] flex flex-col">
<h2 class="text-sm font-bold text-text-secondary mb-10 tracking-tight">空数据：缺省页面</h2>
<div class="flex-1 flex flex-col items-center justify-center">
<div class="w-20 h-20 bg-surface-container-low rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-outline-variant" style="font-size: 48px;">inventory_2</span>
</div>
<h3 class="text-base font-bold text-text-main mb-2">暂无生产数据</h3>
<p class="text-sm text-text-secondary text-center max-w-[200px]">当前筛选范围内没有记录</p>
</div>
</section>
<!-- 3. Error State -->
<section class="p-4 border-b border-border-main min-h-[320px] flex flex-col">
<h2 class="text-sm font-bold text-text-secondary mb-10 tracking-tight">请求错误：异常提示</h2>
<div class="flex-1 flex flex-col items-center justify-center">
<div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-danger-red" style="font-size: 40px;">error_outline</span>
</div>
<h3 class="text-base font-bold text-text-main mb-2">数据加载失败</h3>
<p class="text-sm text-text-secondary mb-8">请检查网络后重试</p>
<button class="px-8 py-2.5 border-2 border-industrial-teal text-industrial-teal font-bold rounded-lg active:bg-industrial-teal/5 transition-colors">
                        重新加载
                    </button>
</div>
</section>
<!-- 4. Session Expired State (Demo Container) -->
<section class="p-4 bg-slate-100 relative min-h-[400px]">
<h2 class="text-sm font-bold text-text-secondary mb-4 tracking-tight">会话失效：强制登录弹窗</h2>
<!-- Mock Page Background -->
<div class="opacity-30 pointer-events-none">
<div class="h-4 bg-white w-full rounded mb-2"></div>
<div class="h-4 bg-white w-5/6 rounded mb-2"></div>
<div class="h-4 bg-white w-4/6 rounded mb-6"></div>
<div class="grid grid-cols-2 gap-2">
<div class="h-20 bg-white rounded-lg"></div>
<div class="h-20 bg-white rounded-lg"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 bg-black/40 flex items-center justify-center p-6 z-10">
<div class="bg-white w-full max-w-[280px] rounded-2xl shadow-2xl overflow-hidden">
<div class="p-6 text-center">
<span class="material-symbols-outlined text-safety-orange mb-4" style="font-size: 32px;">lock_person</span>
<h3 class="text-[17px] font-bold text-text-main mb-2">登录状态已失效</h3>
<p class="text-sm text-text-secondary leading-relaxed">为了账号安全，请重新登录</p>
</div>
<div class="px-6 pb-6">
<button class="w-full bg-industrial-teal text-white py-3 rounded-xl font-bold active:bg-industrial-teal-dark transition-colors shadow-sm">
                                重新登录
                            </button>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface dark:bg-inverse-surface border-t border-outline-variant dark:border-outline shadow-sm min-h-[56px]">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant active:bg-surface-container-low transition-colors flex-1 h-full">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label text-xs">看板</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant active:bg-surface-container-low transition-colors flex-1 h-full">
<span class="material-symbols-outlined">analytics</span>
<span class="font-label text-xs">分析</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant active:bg-surface-container-low transition-colors flex-1 h-full">
<span class="material-symbols-outlined">history</span>
<span class="font-label text-xs">追溯</span>
</button>
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-bold active:bg-surface-container-low transition-colors flex-1 h-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label text-xs">我的</span>
</button>
</nav>
</div>
</body></html>
