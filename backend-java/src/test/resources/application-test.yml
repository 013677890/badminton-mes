spring:
  application:
    name: badminton-mes-test

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MES_TEST_DB_URL:jdbc:mysql://localhost:3306/badminton_mes_test?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MES_TEST_DB_USERNAME:mes_test}
    password: ${MES_TEST_DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${MES_TEST_REDIS_HOST:localhost}
      port: ${MES_TEST_REDIS_PORT:6379}
      database: 1

logging:
  level:
    com.badminton.mes: DEBUG
    org.springframework.web: DEBUG
    org.springframework.test: DEBUG
