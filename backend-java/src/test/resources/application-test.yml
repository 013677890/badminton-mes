spring:
  application:
    name: badminton-mes-test
  
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${MES_DB_URL:jdbc:mariadb://localhost:3306/badminton_mes_test?allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MES_DB_USERNAME:mes}
    password: ${MES_DB_PASSWORD:mes123}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${MES_REDIS_HOST:localhost}
      port: ${MES_REDIS_PORT:6379}
      database: 1

logging:
  level:
    com.badminton.mes: DEBUG
    org.springframework.web: DEBUG
    org.springframework.test: DEBUG
