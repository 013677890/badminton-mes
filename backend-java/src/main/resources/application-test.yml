spring:
  datasource:
    url: ${MES_TEST_DB_URL:jdbc:mysql://localhost:3306/badminton_mes_test?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MES_TEST_DB_USERNAME:mes_test}
    password: ${MES_TEST_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${MES_TEST_REDIS_HOST:localhost}
      port: ${MES_TEST_REDIS_PORT:6379}

mes:
  web:
    cors:
      allowed-origins: ${MES_TEST_CORS_ALLOWED_ORIGINS:http://localhost:5173}
