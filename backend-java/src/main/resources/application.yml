# 羽毛球 MES 后端公共配置，仅保留与运行环境无关的选项。
# 本地默认启用 dev；部署环境必须显式设置 SPRING_PROFILES_ACTIVE=prod。
spring:
  application:
    name: badminton-mes
  profiles:
    default: dev
  flyway:
    # 数据库结构统一由 Flyway 迁移脚本管理，禁止手工改库
    locations: classpath:db/migration
  jpa:
    # Flyway 是唯一建表入口；Hibernate 只负责 ORM，不自动创建或变更表结构
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: ${MES_SERVER_PORT:8080}
