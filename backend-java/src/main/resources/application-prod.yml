spring:
  datasource:
    url: ${MES_DB_URL}
    username: ${MES_DB_USERNAME}
    password: ${MES_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${MES_REDIS_HOST}
      port: ${MES_REDIS_PORT}

mes:
  web:
    cors:
      allowed-origins: ${MES_CORS_ALLOWED_ORIGINS}
